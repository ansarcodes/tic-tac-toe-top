<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">Tic Tac Toe</div>
    <div class="main-container">
        <form id="players-info-form">
            <div class="player1">
                <label for="player1-name">X:</label>
                <input type="text" id="player1-name" value="Player 1">
            </div>
            <div class="player2">
                <label for="player2-name">O:</label>
                <input type="text" id="player2-name" value="Player 2">
            </div>
        </form>
        <div class="board"></div>
        <div class="players-score">
            <div class="score-table">
                <div class="score-head">Score</div>
                <div class="player1-name">Player 1</div>
                <div class="player1-score">0</div>
                <div class="player2-name">Player 2</div>
                <div class="player2-score">0</div>
            </div>
        </div>
    </div>
    <div class="controls">
        <div class="start">START</div>
        <div class="reset">RESET</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
